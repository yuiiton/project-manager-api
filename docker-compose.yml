services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gerenciador-projetos-api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - api_data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped

volumes:
  api_data:
